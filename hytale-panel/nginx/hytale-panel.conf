# ============================================================
# Hytale Panel — Nginx Reverse Proxy Configuration
# ============================================================
# Replace panel.yourdomain.com with your actual domain.
#
# Routing:
#   /           → web (Next.js frontend on port 3000)
#   /api/       → api (Fastify API on port 4000)
#   /ws/        → api (WebSocket on port 4000)
#
# Install:
#   sudo cp nginx/hytale-panel.conf /etc/nginx/sites-available/hytale-panel
#   sudo ln -s /etc/nginx/sites-available/hytale-panel /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Get TLS certificate:
#   sudo certbot --nginx -d panel.yourdomain.com
# ============================================================

# Rate limiting zone for login endpoint
limit_req_zone $binary_remote_addr zone=panel_login:10m rate=5r/m;
# General API rate limiting to absorb bursts before they reach Fastify.
limit_req_zone $binary_remote_addr zone=panel_api:10m rate=60r/m;

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name panel.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name panel.yourdomain.com;
    server_tokens off;

    # ─── TLS ────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/panel.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.yourdomain.com/privkey.pem;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ─── Security Headers ───────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    # CSP is emitted by the Next.js web app response layer.
    # The API also sets its own CSP for API responses.
    # Keep proxy-level CSP overrides disabled unless you intentionally replace
    # the app policy with a tested alternative.

    # ─── Limits ─────────────────────────────────────────────
    client_max_body_size 1m;

    # ─── Login rate limiting ────────────────────────────────
    location = /api/auth/login {
        limit_req zone=panel_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── WebSocket endpoints → API ──────────────────────────
    location /ws/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── API endpoints → API ────────────────────────────────
    location /api/ {
        limit_req zone=panel_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }

    # ─── Everything else → Web frontend ─────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }

    # ─── Optional: IP allowlisting ──────────────────────────
    # Uncomment to restrict panel access to specific IPs:
    # allow 1.2.3.4;     # Admin IP 1
    # allow 5.6.7.8;     # Admin IP 2
    # deny all;
}
